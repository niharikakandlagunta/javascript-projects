<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg, #74ebd5, #ACB6E5);
    }

    #box{
        width:380px;
        background:white;
        padding:30px;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        text-align:center;
        transition:transform 0.3s;
    }

    #box:hover{
        transform:translateY(-5px);
    }

    h1{
        color:#333;
        margin-bottom:20px;
        font-size:28px;
    }

    input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:2px solid #ddd;
        border-radius:10px;
        font-size:16px;
        outline:none;
    }

    input:focus{
        border-color:#6a11cb;
    }

    select{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:2px solid #ddd;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:15px;
        border:none;
        border-radius:10px;
        background:linear-gradient(45deg, #6a11cb, #2575fc);
        color:white;
        font-size:18px;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.05);
    }

    #result{
        margin-top:20px;
        padding:15px;
        background:#f5f5f5;
        border-radius:10px;
        font-size:22px;
        font-weight:bold;
        color:#333;
    }
</style>
</head>
<body>

    <div id="box">
        <h1>Temperature Converter</h1>

        <input type="number" id="temp" placeholder="Enter temperature">

        <select id="type">
            <option value="c">Celsius</option>
            <option value="f">Fahrenheit</option>
        </select>

        <button id="convert">Convert</button>

        <p id="result"></p>
    </div>

    <script>
        document.getElementById("convert").addEventListener("click", function() {

            let temp = parseFloat(document.getElementById("temp").value);
            let type = document.getElementById("type").value;
            let result;

            if (type == "c") {
                result = (temp * 9/5) + 32;
                document.getElementById("result").innerHTML =
                    temp + "°C = " + result.toFixed(2) + "°F";
            }
            else {
                result = (temp - 32) * 5/9;
                document.getElementById("result").innerHTML =
                    temp + "°F = " + result.toFixed(2) + "°C";
            }

        });
    </script>

</body>
</html>
