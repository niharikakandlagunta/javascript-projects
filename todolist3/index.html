<!DOCTYPE html>
<html>
<head>
    <title>To Do List</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1{
            margin-bottom: 20px;
        }

        input{
            width: 70%;
            padding: 10px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        .add-btn{
            padding: 10px 15px;
            border: none;
            background: #2575fc;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        ul{
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li{
            background: #f4f4f4;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn{
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-btn:hover{
            background: darkred;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📝 To Do List</h1>

        <input type="text" id="task" placeholder="Enter a task">
        <button class="add-btn" onclick="addTask()">Add</button>

        <ul id="list"></ul>
    </div>

    <script>
        function addTask() {

            let task = document.getElementById("task").value;

            if(task === ""){
                alert("Please enter a task");
                return;
            }

            let li = document.createElement("li");

            li.innerHTML =
                task +
                " <button class='delete-btn' onclick='this.parentElement.remove()'>Delete</button>";

            document.getElementById("list").appendChild(li);

            document.getElementById("task").value = "";
        }
    </script>

</body>
</html>
